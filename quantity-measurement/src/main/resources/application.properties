spring.application.name=quantity-measurement

# ==================== MySQL Database (UC16) ====================
spring.datasource.url=jdbc:mysql://localhost:3306/QMA?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Kiran@12
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Schema initialisation (runs schema.sql on startup via JDBC, not JPA)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# UC17: REST API
server.port=8080
spring.mvc.problem-details.enabled=true

# Logging
logging.level.com.quantitymeasurement=DEBUG
